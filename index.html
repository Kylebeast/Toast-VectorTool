<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FiveM Vector Tool</title>

<style>
:root{
--bg:#0b1220;
--card:#0f1b31;
--muted:#8ea3c6;
--text:#e8f0ff;
--border:#1e2c4d;
--ok:#37d67a;
--bad:#ff5c5c;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
background:radial-gradient(900px 500px at 20% 0%, #14264a 0%, var(--bg) 60%);
color:var(--text);
padding:24px
}

.wrap{
max-width:900px;
margin:0 auto;
display:grid;
gap:16px
}

.card{
background:linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));
border:1px solid var(--border);
border-radius:14px;
padding:16px
}

textarea{
width:100%;
min-height:120px;
resize:vertical;
background:#0a1427;
border:1px solid var(--border);
border-radius:12px;
color:var(--text);
padding:12px;
font-size:14px;
outline:none
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:10px
}

.btn{
border:1px solid var(--border);
background:#0a1427;
color:var(--text);
padding:10px 12px;
border-radius:12px;
cursor:pointer;
font-size:13px
}

.btn:hover{
border-color:#4da3ff
}

.kv{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:14px
}

.field{
background:#0a1427;
border:1px solid var(--border);
border-radius:12px;
padding:10px;
display:flex;
align-items:center;
justify-content:space-between
}

.k{
color:var(--muted);
font-size:12px
}

.v{
font-weight:800
}

.out{
margin-top:14px;
background:#0a1427;
border:1px solid var(--border);
border-radius:12px;
padding:12px;
font-family:monospace;
font-size:13px
}

.status{
margin-top:10px;
font-size:13px
}

.status.ok{color:var(--ok)}
.status.bad{color:var(--bad)}
</style>
</head>

<body>

<div class="wrap">

<div class="card">

<h2>FiveM Vector Tool</h2>

<textarea id="inp" placeholder="vector4(468.52, -928.83, 28.45, 87.8)"></textarea>

<div class="row">
<button class="btn" id="btnParse">Parse</button>
<button class="btn" id="btnClear">Clear</button>
<button class="btn" id="btnDemo">Demo</button>
</div>

<div id="status" class="status">Waiting for input</div>

<div class="kv">

<div class="field">
<div>
<div class="k">X</div>
<div class="v" id="xVal">—</div>
</div>
<button class="btn" data-copy="x">Copy</button>
</div>

<div class="field">
<div>
<div class="k">Y</div>
<div class="v" id="yVal">—</div>
</div>
<button class="btn" data-copy="y">Copy</button>
</div>

<div class="field">
<div>
<div class="k">Z</div>
<div class="v" id="zVal">—</div>
</div>
<button class="btn" data-copy="z">Copy</button>
</div>

<div class="field">
<div>
<div class="k">W</div>
<div class="v" id="wVal">—</div>
</div>
<button class="btn" data-copy="w">Copy</button>
</div>

</div>

<div class="row">

<button class="btn" id="copyV2">Copy vector2</button>
<button class="btn" id="copyV3">Copy vector3</button>
<button class="btn" id="copyV4">Copy vector4</button>
<button class="btn" id="copyTP">Copy /tp</button>
<button class="btn" id="copyHeading">Copy heading</button>

</div>

<div class="out" id="outBox">—</div>

</div>

</div>

<script>

const inp=document.getElementById("inp")
const status=document.getElementById("status")

const xVal=document.getElementById("xVal")
const yVal=document.getElementById("yVal")
const zVal=document.getElementById("zVal")
const wVal=document.getElementById("wVal")

let current={x:null,y:null,z:null,w:null}

function extractNumbers(text){
const re=/[-+]?(?:\d+\.?\d*|\.\d+)/g
const m=text.match(re)||[]
return m.map(Number)
}

function parse(){

const nums=extractNumbers(inp.value)

if(nums.length<2){
status.className="status bad"
status.textContent="Need at least X and Y"
return
}

current.x=nums[0]
current.y=nums[1]
current.z=nums[2]??null
current.w=nums[3]??null

xVal.textContent=current.x
yVal.textContent=current.y
zVal.textContent=current.z??"—"
wVal.textContent=current.w??"—"

status.className="status ok"
status.textContent="Parsed successfully"

document.getElementById("outBox").textContent=
`vector2(${current.x}, ${current.y})
vector3(${current.x}, ${current.y}, ${current.z ?? 0})
vector4(${current.x}, ${current.y}, ${current.z ?? 0}, ${current.w ?? 0})
/tp ${current.x} ${current.y} ${current.z ?? 0}`

}

function copy(text){
navigator.clipboard.writeText(text)
status.className="status ok"
status.textContent="Copied"
}

document.getElementById("btnParse").onclick=parse

document.getElementById("btnClear").onclick=()=>{
inp.value=""
status.textContent="Cleared"
}

document.getElementById("btnDemo").onclick=()=>{
inp.value="vector4(468.52, -928.83, 28.45, 87.8)"
parse()
}

document.getElementById("copyV2").onclick=()=>copy(`vector2(${current.x}, ${current.y})`)
document.getElementById("copyV3").onclick=()=>copy(`vector3(${current.x}, ${current.y}, ${current.z ?? 0})`)
document.getElementById("copyV4").onclick=()=>copy(`vector4(${current.x}, ${current.y}, ${current.z ?? 0}, ${current.w ?? 0})`)
document.getElementById("copyTP").onclick=()=>copy(`/tp ${current.x} ${current.y} ${current.z ?? 0}`)
document.getElementById("copyHeading").onclick=()=>copy(`SetEntityHeading(PlayerPedId(), ${current.w ?? 0})`)

document.addEventListener("click",e=>{
const btn=e.target.closest("button[data-copy]")
if(!btn)return
copy(current[btn.dataset.copy])
})

</script>

</body>
</html>
